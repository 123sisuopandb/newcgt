<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Card / sheet holding the seed phrase -->
  <rect x="86" y="120" width="340" height="330" rx="28" fill="#E8F5E9"/>
  <rect x="86" y="120" width="340" height="330" rx="28" fill="none" stroke="#66BB6A" stroke-width="10"/>

  <!-- Grid of numbered word cards (a 12-word mnemonic) -->
  <g>
    <!-- row 1 -->
    <rect x="120" y="170" width="118" height="46" rx="12" fill="#C8E6C9"/>
    <circle cx="142" cy="193" r="10" fill="#43A047"/>
    <rect x="162" y="188" width="60" height="10" rx="5" fill="#2E7D32"/>
    <rect x="274" y="170" width="118" height="46" rx="12" fill="#C8E6C9"/>
    <circle cx="296" cy="193" r="10" fill="#43A047"/>
    <rect x="316" y="188" width="60" height="10" rx="5" fill="#2E7D32"/>
    <!-- row 2 -->
    <rect x="120" y="234" width="118" height="46" rx="12" fill="#C8E6C9"/>
    <circle cx="142" cy="257" r="10" fill="#43A047"/>
    <rect x="162" y="252" width="60" height="10" rx="5" fill="#2E7D32"/>
    <rect x="274" y="234" width="118" height="46" rx="12" fill="#C8E6C9"/>
    <circle cx="296" cy="257" r="10" fill="#43A047"/>
    <rect x="316" y="252" width="60" height="10" rx="5" fill="#2E7D32"/>
    <!-- row 3 -->
    <rect x="120" y="298" width="118" height="46" rx="12" fill="#C8E6C9"/>
    <circle cx="142" cy="321" r="10" fill="#43A047"/>
    <rect x="162" y="316" width="60" height="10" rx="5" fill="#2E7D32"/>
    <rect x="274" y="298" width="118" height="46" rx="12" fill="#C8E6C9"/>
    <circle cx="296" cy="321" r="10" fill="#43A047"/>
    <rect x="316" y="316" width="60" height="10" rx="5" fill="#2E7D32"/>
    <!-- row 4 -->
    <rect x="120" y="362" width="118" height="46" rx="12" fill="#C8E6C9"/>
    <circle cx="142" cy="385" r="10" fill="#43A047"/>
    <rect x="162" y="380" width="60" height="10" rx="5" fill="#2E7D32"/>
    <rect x="274" y="362" width="118" height="46" rx="12" fill="#C8E6C9"/>
    <circle cx="296" cy="385" r="10" fill="#43A047"/>
    <rect x="316" y="380" width="60" height="10" rx="5" fill="#2E7D32"/>
  </g>

  <!-- Sprouting seed on top of the sheet -->
  <g>
    <path d="M256 118 C256 92 256 78 256 62" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
    <path d="M256 84 C230 84 208 66 208 40 C238 40 256 58 256 84 Z" fill="#7AC943"/>
    <path d="M256 74 C282 74 304 56 304 30 C274 30 256 48 256 74 Z" fill="#66BB6A"/>
    <circle cx="256" cy="120" r="18" fill="#F0C419"/>
    <circle cx="256" cy="120" r="18" fill="none" stroke="#E0A800" stroke-width="4"/>
  </g>
</svg>
